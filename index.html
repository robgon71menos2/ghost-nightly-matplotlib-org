<!DOCTYPE html>
<html>
<head>
    <title>Security Check</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { text-align: center; border: 1px solid #333; padding: 40px; border-radius: 10px; background: #222; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="box">
        <h2>Verifying your connection...</h2>
        <p>Please wait a few seconds to access the resource.</p>
        <div class="loader"></div>
        
        <script type='text/javascript' src='//tu-script-aqui.js'></script>
    </div>
</body>
</html>
